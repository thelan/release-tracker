variables:
  # BuildKit settings
  BUILDKIT_HOST: "tcp://localhost:1234"

build-with-buildkit:
  stage: build
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  # BuildKit needs to run as a sidecar or with specific security permissions.
  # This command starts the daemon in the background before running the build.
  script:
    - mkdir -p ~/.docker
    # Authenticate to GitLab Registry
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(echo -n $CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD | base64)\"}}}" > ~/.docker/config.json
    
    # Define tag logic
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag="latest"
      else
        tag="$CI_COMMIT_REF_SLUG"
      fi

    # Build and push using buildctl-daemonless
    # We use --output to push the image directly to the registry
    - buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --output type=image,name=$CI_REGISTRY_IMAGE:$tag,push=true

    # Handle ADISTA Registry Push
    # Since BuildKit doesn't have a direct 'tag' command like Buildah, 
    # we pull and re-push or build again for the second registry.
    - echo "{\"auths\":{\"registry.corp.adista.fr\":{\"auth\":\"$(echo -n ${ADISTA_REGISTRY_LOGIN}:${ADISTA_REGISTRY_PASSWORD} | base64)\"}}}" >> ~/.docker/config.json
    - buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --output type=image,name=registry.corp.adista.fr/svm/${CI_PROJECT_NAME}:$tag,push=true