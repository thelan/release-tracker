# Build a Docker image with CI/CD and push to the GitLab registry.
# Docker-in-Docker documentation: https://docs.gitlab.com/ee/ci/docker/using_docker_build.html
#
# This template uses one generic job with conditional builds
# for the default branch and all other (MR) branches.

variables:
  STORAGE_DRIVER: vfs
  BUILDAH_ISOLATION: chroot

build-with-buildah:
  stage: build
  image: quay.io/buildah/stable:latest
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag="latest"
        echo "Running on default branch '$CI_DEFAULT_BRANCH': tag = 'latest'"
      else
        tag="$CI_COMMIT_REF_SLUG"
        echo "Running on branch '$CI_COMMIT_BRANCH': tag = $tag"
      fi
    - echo "$CI_REGISTRY_PASSWORD" | buildah login --username "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - buildah build --tag $CI_REGISTRY_IMAGE:latest .
    - buildah push $CI_REGISTRY_IMAGE:$tag
    # ADISTA
    - echo "$ADISTA_REGISTRY_PASSWORD" | buildah login --username "${ADISTA_REGISTRY_LOGIN}" --password-stdin registry.corp.adista.fr
    - buildah tag $CI_REGISTRY_IMAGE:$tag registry.corp.adista.fr/svm/${CI_PROJECT_NAME}
    - buildah push registry.corp.adista.fr/svm/${CI_PROJECT_NAME}
    

